<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard Quiz</title>
    <link rel="stylesheet" href="Flashcard styles.css">
</head>
<body>
    <div class= "flashcard-container">
        <h1>Flashcard Review</h1>
        <div id="flashcard" class="flashcard">

            <div class="front">
                <p id="question">Question here</p>
            </div>

            <div class="back">
                <p id="answer">Answer here</p>
            </div>

        </div>
        <button id="flip-card">Flip Card</button>
        <button id="next-card">Next</button>
    </div>
    <script src="Flashcard script.js"></script>
</body>
</html>
